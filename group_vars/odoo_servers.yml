---
# ── Connection (from vault, so no -k/-K flags needed) ─────────────────────────
ansible_password: "{{ vault_ssh_password }}"
ansible_become_password: "{{ vault_sudo_password }}"

# ── Odoo Version ─────────────────────────────────────────────────────────────
odoo_version: "19.0"                        # Change to 15.0 / 16.0 / 17.0
odoo_release: "20240401"                    # Set to specific nightly or leave empty ""
odoo_repo: "https://github.com/odoo/odoo.git"

# ── System User ───────────────────────────────────────────────────────────────
odoo_user: odoo
odoo_group: odoo
odoo_home: /opt/odoo
odoo_install_dir: "{{ odoo_home }}/odoo-server"
odoo_venv_dir: "{{ odoo_home }}/venv"
odoo_config_dir: /etc/odoo
odoo_log_dir: /var/log/odoo
odoo_data_dir: "{{ odoo_home }}/data"
odoo_addons_dir: "{{ odoo_home }}/custom-addons"
odoo_backup_dir: /var/backups/odoo

# ── Python ────────────────────────────────────────────────────────────────────
python_version: "3.12"   # 3.12 on Ubuntu 24.04 (Odoo 17); 3.10 on 22.04; 3.8 for Odoo 15

# ── Node.js (for Odoo CSS tooling: less, rtlcss) ──────────────────────────────
nodejs_version: "20"     # LTS; installed from NodeSource

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgres_version: "16"   # Ubuntu 24.04 native version
pg_user: odoo
pg_password: "{{ vault_pg_password }}"
pg_db: odoo_prod
pg_host: "localhost"
pg_port: 5432

# ── Odoo Config ───────────────────────────────────────────────────────────────
odoo_port: 8069
odoo_longpolling_port: 8072
odoo_workers: 4                             # CPUs * 2 + 1 recommended
odoo_max_cron_threads: 2
odoo_limit_memory_hard: 2684354560          # 2.5 GB
odoo_limit_memory_soft: 2147483648          # 2 GB
odoo_limit_request: 8192
odoo_limit_time_cpu: 60
odoo_limit_time_real: 120
odoo_admin_passwd: "{{ vault_odoo_admin_passwd }}"
odoo_db_filter: ".*"

# ── NGINX / SSL ───────────────────────────────────────────────────────────────
domain_name: "{{ vault_domain_name }}"
enable_ssl: false                           # Set true after DNS is configured
letsencrypt_email: "{{ vault_letsencrypt_email }}"

# ── Git ───────────────────────────────────────────────────────────────────────
git_branch: "{{ odoo_version }}"

# GitHub token for cloning private HTTPS repos (see vault_github_token in vault.yml)
github_token: "{{ vault_github_token | default('') }}"

# ── Custom Addons Repositories ────────────────────────────────────────────────
# Define Git repositories to clone into custom-addons directory
# Each entry should have:
#   repo    (required) Git URL
#   branch  (optional) defaults to git_branch
#   private (optional) set true for private HTTPS repos — the vault_github_token
#           is injected into the clone URL. Defaults to false (public).
# The folder name is derived from the repo URL (e.g., server-tools from server-tools.git)
#
# Example:
# custom_addons_repos:
#   - repo: "https://github.com/OCA/server-tools.git"      # public
#     branch: "17.0"
#   - repo: "https://github.com/mycompany/private-addons.git"  # private via token
#     branch: "main"
#     private: true
#   - repo: "git@github.com:mycompany/other-addons.git"    # private via SSH key
#     branch: "main"
#
custom_addons_repos: []

# ── Wkhtmltopdf ───────────────────────────────────────────────────────────────
wkhtmltopdf_url: "https://github.com/wkhtmltopdf/packaging/releases/download/0.12.6.1-3/wkhtmltox_0.12.6.1-3.jammy_amd64.deb"
