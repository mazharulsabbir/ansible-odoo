# ============================================================================
# Password-based SSH Authentication Inventory
# ============================================================================
#
# This inventory uses Ansible Vault for secure credential storage.
# All sensitive values (server host, passwords) are stored in group_vars/all/vault.yml
#
# Usage:
#   ansible-playbook -i inventory/hosts_password.ini site.yml --ask-vault-pass
#   OR
#   ansible-playbook -i inventory/hosts_password.ini site.yml --vault-password-file .vault_pass
#
# Setup:
#   1. Copy group_vars/all/vault.yml.example to group_vars/all/vault.yml
#   2. Edit vault.yml with your actual values
#   3. Encrypt: ansible-vault encrypt group_vars/all/vault.yml
#
# ============================================================================

[odoo_servers]
odoo-prod ansible_host="{{ vault_server_host }}" ansible_user=root ansible_ssh_pass="{{ vault_ssh_password }}" ansible_become_pass="{{ vault_sudo_password }}"

[odoo_servers:vars]
ansible_python_interpreter=/usr/bin/python3

