# ============================================================================
# Password-based SSH Authentication Inventory
# ============================================================================
#
# Use this inventory when SSH key authentication is not available.
# For security, NEVER store passwords in this file. Use one of these methods:
#
# Option 1 (Recommended): Interactive password prompts
#   ansible-playbook -i inventory/hosts_password.ini site.yml -k -K
#   -k = prompt for SSH password
#   -K = prompt for sudo password
#
# Option 2: Use Ansible Vault for passwords
#   Store passwords in group_vars/vault.yml (encrypted)
#   ansible_ssh_pass: "{{ vault_ssh_password }}"
#
# Option 3: SSH keys (preferred - use hosts.ini instead)
#
# ============================================================================

[odoo_servers]
# Replace YOUR_SERVER_IP with your actual server IP address
odoo-prod ansible_host=YOUR_SERVER_IP ansible_user=root

[odoo_servers:vars]
ansible_python_interpreter=/usr/bin/python3

