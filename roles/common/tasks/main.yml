---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: dist
    autoremove: yes

- name: Install system dependencies
  apt:
    name:
      - build-essential
      - curl
      - wget
      - unzip
      - git
      - libxml2-dev
      - libxslt1-dev
      - libevent-dev
      - libsasl2-dev
      - libldap2-dev
      - libpq-dev
      - libjpeg-dev
      - libpng-dev
      - libtiff-dev
      - libfreetype6-dev
      - liblcms2-dev
      - libwebp-dev
      - libharfbuzz-dev
      - libfribidi-dev
      - libxcb1-dev
      - zlib1g-dev
      - libssl-dev
      - libffi-dev
      - libmysqlclient-dev
      - fontconfig
      - xfonts-75dpi
      - xfonts-base
      - node-less
      - npm
      - ufw
      - fail2ban
      - htop
      - vim
      - tmux
    state: present

- name: Install Python build dependencies
  apt:
    name:
      - "python{{ python_version }}"
      - "python{{ python_version }}-dev"
      - "python{{ python_version }}-venv"
      - python3-pip
      - python3-wheel
      - python3-setuptools
    state: present

- name: Set timezone to UTC
  timezone:
    name: UTC

- name: Configure UFW - allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Configure UFW - allow HTTP
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Configure UFW - allow HTTPS
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Configure UFW - allow Odoo (internal/load-balancer only)
  ufw:
    rule: allow
    port: "{{ odoo_port }}"
    proto: tcp
    src: "127.0.0.1"

- name: Enable UFW
  ufw:
    state: enabled
    policy: deny

- name: Configure fail2ban
  copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime  = 3600
      findtime = 600
      maxretry = 5

      [sshd]
      enabled = true
      port    = ssh
      logpath = %(sshd_log)s
  notify: restart fail2ban

- name: Set swappiness
  sysctl:
    name: vm.swappiness
    value: "10"
    sysctl_set: yes
    state: present
    reload: yes

- name: Increase file descriptor limits
  pam_limits:
    domain: "{{ odoo_user }}"
    limit_type: "{{ item.type }}"
    limit_item: nofile
    value: "{{ item.value }}"
  loop:
    - { type: soft, value: "65536" }
    - { type: hard, value: "65536" }
