---
- name: Install PostgreSQL {{ postgres_version }}
  apt:
    name:
      - "postgresql-{{ postgres_version }}"
      - "postgresql-client-{{ postgres_version }}"
      - "postgresql-contrib-{{ postgres_version }}"
      - python3-psycopg2
    update_cache: yes
    state: present

- name: Ensure PostgreSQL is started and enabled
  systemd:
    name: postgresql
    state: started
    enabled: yes
    daemon_reload: yes

- name: Configure PostgreSQL pg_hba.conf
  template:
    src: pg_hba.conf.j2
    dest: "/etc/postgresql/{{ postgres_version }}/main/pg_hba.conf"
    owner: postgres
    group: postgres
    mode: "0640"
  notify: restart postgresql

- name: Configure PostgreSQL performance settings
  template:
    src: postgresql.conf.j2
    dest: "/etc/postgresql/{{ postgres_version }}/main/postgresql.conf"
    owner: postgres
    group: postgres
    mode: "0644"
  notify: restart postgresql

- name: Apply PostgreSQL configuration before connecting
  meta: flush_handlers

- name: Create PostgreSQL odoo user
  become_user: postgres
  postgresql_user:
    name: "{{ pg_user }}"
    password: "{{ pg_password }}"
    role_attr_flags: CREATEDB,NOSUPERUSER
    state: present

- name: Create Odoo database
  become_user: postgres
  postgresql_db:
    name: "{{ pg_db }}"
    owner: "{{ pg_user }}"
    encoding: UTF8
    lc_collate: en_US.UTF-8
    lc_ctype: en_US.UTF-8
    template: template0
    state: present
